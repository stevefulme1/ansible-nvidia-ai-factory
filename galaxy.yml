description: "EXPERIMENTAL - proof of concept, not production ready. Ansible Collection for multi-vendor GPU AI Factory automation. Provides modules for NVIDIA Base Command Manager (BCM) cluster management, DGX/HGX node provisioning, GPU allocation, tenant isolation, InfiniBand/RDMA networking, NeMo model deployment, Triton Inference Server, NGC catalog management, AMD MI300X GPU management via ROCm SMI, Intel Gaudi accelerator management via Habana Labs API, DISA STIG and CIS benchmark security compliance, HashiCorp Vault credential integration, AAP subscription sizing, and Professional Services deployment bundles. Includes EDA event source plugins for DGX telemetry, InfiniBand fabric monitoring, and NGC catalog watches."
