name: nvidia_ai_factory
version: 1.0.0
readme: README.md
authors:
  - Steve Fulmer <sfulmer@redhat.com>
description: >-
  Ansible Collection for NVIDIA AI Factory / Sovereign AI Factory.
  Provides modules for Base Command Manager (BCM) cluster management,
  DGX/HGX node provisioning, GPU allocation, tenant isolation,
  InfiniBand/RDMA networking, NeMo model deployment, Triton Inference
  Server, NGC catalog management, and a dynamic inventory plugin.
  Includes EDA event source plugins for DGX telemetry, InfiniBand
  fabric monitoring, and NGC catalog watches.
