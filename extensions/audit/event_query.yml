---
# extensions/audit/event_query.yml
# Maps module return values to the AAP Normalized Resource Taxonomy
# for indirect node counting.
#
# GPU AI Factory modules manage bare-metal GPU nodes (DGX, AMD, BCM)
# and inference serving endpoints (Triton, NeMo).  Return dicts come
# from the NVIDIA BCM API via to_dict().

stevefulme1.gpu_ai_factory.bcm_node:
  query: >-
    {
      name: .node.hostname,
      canonical_facts: {
        uuid: .node.id
      },
      facts: {
        device_type: "bare_metal"
      }
    }

