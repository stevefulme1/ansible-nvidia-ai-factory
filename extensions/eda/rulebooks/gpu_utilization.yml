---
- name: GPU Utilization Monitoring
  hosts: all
  sources:
    - stevefulme1.nvidia_ai_factory.dgx_telemetry:
        hosts: "{{ dgx_bmc_hosts }}"
        username: "{{ redfish_username }}"
        password: "{{ redfish_password }}"
        interval: 60
        metrics:
          - gpu_errors

  rules:
    - name: GPU utilization below threshold - right-sizing alert
      condition: >-
        event.dgx_telemetry.gpu_errors is defined and
        event.dgx_telemetry.gpu_errors.gpu_utilization | default(100) < 20
      action:
        run_playbook:
          name: stevefulme1.nvidia_ai_factory.gpu_rightsizing_alert
          extra_vars:
            affected_host: "{{ event.dgx_telemetry.host }}"
            utilization: "{{ event.dgx_telemetry.gpu_errors.gpu_utilization }}"

    - name: GPU utilization critically low - wasted resources
      condition: >-
        event.dgx_telemetry.gpu_errors is defined and
        event.dgx_telemetry.gpu_errors.gpu_utilization | default(100) < 5
      action:
        run_playbook:
          name: stevefulme1.nvidia_ai_factory.gpu_idle_alert
          extra_vars:
            affected_host: "{{ event.dgx_telemetry.host }}"
            utilization: "{{ event.dgx_telemetry.gpu_errors.gpu_utilization }}"

    - name: GPU memory utilization high
      condition: >-
        event.dgx_telemetry.gpu_errors is defined and
        event.dgx_telemetry.gpu_errors.gpu_memory_utilization | default(0) > 95
      action:
        debug:
          msg: >-
            GPU memory utilization at
            {{ event.dgx_telemetry.gpu_errors.gpu_memory_utilization }}% on
            {{ event.dgx_telemetry.host }} - consider scaling
