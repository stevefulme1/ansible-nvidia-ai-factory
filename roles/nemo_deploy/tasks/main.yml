---
- name: Pull NGC container image for model serving
  stevefulme1.gpu_ai_factory.ngc_image:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    image_name: "{{ nemo_deploy_image }}"
    tag: "{{ nemo_deploy_image_tag | default('latest') }}"
    pull_policy: "if_not_present"
    validate_certs: "{{ nemo_deploy_validate_certs }}"
    state: present

- name: Create Triton Inference Server instance
  stevefulme1.gpu_ai_factory.triton_server:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    name: "{{ nemo_deploy_model_name }}-triton"
    cluster_id: "{{ bcm_cluster_id }}"
    model_repository: "{{ nemo_deploy_model_repository }}"
    gpu_count: "{{ nemo_deploy_gpu_count }}"
    http_port: "{{ nemo_deploy_triton_http_port }}"
    grpc_port: "{{ nemo_deploy_triton_grpc_port }}"
    metrics_port: "{{ nemo_deploy_triton_metrics_port }}"
    validate_certs: "{{ nemo_deploy_validate_certs }}"
    state: present
    wait: true
  register: triton_result

- name: Deploy NeMo model
  stevefulme1.gpu_ai_factory.nemo_model:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    name: "{{ nemo_deploy_model_name }}"
    model_path: "{{ nemo_deploy_model_path }}"
    cluster_id: "{{ bcm_cluster_id }}"
    gpu_count: "{{ nemo_deploy_gpu_count }}"
    replica_count: "{{ nemo_deploy_replica_count }}"
    max_batch_size: "{{ nemo_deploy_max_batch_size }}"
    tensor_parallel: "{{ nemo_deploy_tensor_parallel }}"
    pipeline_parallel: "{{ nemo_deploy_pipeline_parallel }}"
    validate_certs: "{{ nemo_deploy_validate_certs }}"
    state: present
    wait: true
  register: model_result

- name: Verify model is serving
  stevefulme1.gpu_ai_factory.nemo_model_info:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    model_id: "{{ model_result.model.id | default('') }}"
    validate_certs: "{{ nemo_deploy_validate_certs }}"
  register: model_health
