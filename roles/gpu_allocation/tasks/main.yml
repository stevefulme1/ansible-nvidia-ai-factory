---
- name: Verify tenant exists
  stevefulme1.nvidia_ai_factory.bcm_tenant_info:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    tenant_id: "{{ gpu_allocation_tenant_id }}"
    validate_certs: "{{ gpu_allocation_validate_certs }}"
  register: tenant_info

- name: Check available GPU capacity
  stevefulme1.nvidia_ai_factory.bcm_gpu_allocation_info:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    cluster_id: "{{ bcm_cluster_id }}"
    validate_certs: "{{ gpu_allocation_validate_certs }}"
  register: current_allocations

- name: Create GPU allocation for tenant
  stevefulme1.nvidia_ai_factory.bcm_gpu_allocation:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    tenant_id: "{{ gpu_allocation_tenant_id }}"
    cluster_id: "{{ bcm_cluster_id }}"
    gpu_count: "{{ gpu_allocation_gpu_count }}"
    gpu_type: "{{ gpu_allocation_gpu_type }}"
    mig_profile: "{{ gpu_allocation_mig_profile | default(omit) }}"
    priority: "{{ gpu_allocation_priority }}"
    validate_certs: "{{ gpu_allocation_validate_certs }}"
    state: present
    wait: true
  register: allocation_result

- name: Verify allocation is active
  stevefulme1.nvidia_ai_factory.bcm_gpu_allocation_info:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    tenant_id: "{{ gpu_allocation_tenant_id }}"
    validate_certs: "{{ gpu_allocation_validate_certs }}"
  register: verify_allocation
