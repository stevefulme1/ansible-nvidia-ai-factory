---
- name: Configure InfiniBand ports on training nodes
  stevefulme1.nvidia_ai_factory.infiniband_port:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    port_name: "{{ item.port_name }}"
    node_id: "{{ item.node_id }}"
    speed: "{{ infiniband_rdma_speed }}"
    mtu: "{{ infiniband_rdma_mtu }}"
    enabled: true
    validate_certs: "{{ infiniband_rdma_validate_certs }}"
    state: present
  loop: "{{ infiniband_ports }}"

- name: Create InfiniBand partition for training
  stevefulme1.nvidia_ai_factory.infiniband_partition:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    name: "{{ infiniband_partition_name }}"
    pkey: "{{ infiniband_partition_pkey }}"
    members: "{{ infiniband_port_guids | default([]) }}"
    qos_level: "critical"
    validate_certs: "{{ infiniband_rdma_validate_certs }}"
    state: present

- name: Configure RDMA settings on training nodes
  stevefulme1.nvidia_ai_factory.rdma_config:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    name: "{{ item }}-rdma"
    node_id: "{{ item }}"
    rdma_type: "{{ infiniband_rdma_type }}"
    nccl_socket_ifname: "{{ infiniband_rdma_nccl_socket_ifname }}"
    nccl_ib_hca: "{{ infiniband_rdma_nccl_ib_hca | default(omit) }}"
    validate_certs: "{{ infiniband_rdma_validate_certs }}"
    state: present
  loop: "{{ training_node_ids }}"

- name: Verify InfiniBand fabric health
  stevefulme1.nvidia_ai_factory.infiniband_info:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    validate_certs: "{{ infiniband_rdma_validate_certs }}"
  register: fabric_health
