---
- name: Create BCM tenant
  stevefulme1.gpu_ai_factory.bcm_tenant:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    name: "{{ tenant_name }}"
    description: "{{ tenant_description | default('') }}"
    cluster_id: "{{ bcm_cluster_id }}"
    max_gpus: "{{ tenant_isolation_max_gpus }}"
    max_jobs: "{{ tenant_isolation_max_jobs }}"
    users: "{{ tenant_users | default([]) }}"
    validate_certs: "{{ tenant_isolation_validate_certs }}"
    state: present
  register: tenant_result

- name: Create InfiniBand partition for tenant isolation
  stevefulme1.gpu_ai_factory.infiniband_partition:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    name: "{{ tenant_name }}-partition"
    pkey: "{{ tenant_pkey }}"
    tenant_id: "{{ tenant_result.tenant.id | default(tenant_id) }}"
    qos_level: "{{ tenant_isolation_qos_level }}"
    validate_certs: "{{ tenant_isolation_validate_certs }}"
    state: present

- name: Allocate GPU resources for tenant
  stevefulme1.gpu_ai_factory.bcm_gpu_allocation:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    tenant_id: "{{ tenant_result.tenant.id | default(tenant_id) }}"
    cluster_id: "{{ bcm_cluster_id }}"
    gpu_count: "{{ tenant_isolation_max_gpus }}"
    validate_certs: "{{ tenant_isolation_validate_certs }}"
    state: present
    wait: true

- name: Verify tenant isolation
  stevefulme1.gpu_ai_factory.bcm_tenant_info:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    tenant_id: "{{ tenant_result.tenant.id | default(tenant_id) }}"
    validate_certs: "{{ tenant_isolation_validate_certs }}"
  register: verify_tenant
