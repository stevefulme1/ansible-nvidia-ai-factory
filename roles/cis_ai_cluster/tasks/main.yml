---
# CIS benchmark hardening for AI clusters

- name: Gather package facts
  ansible.builtin.package_facts:
    manager: auto

# User account policies
- name: Set password maximum age
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MAX_DAYS'
    line: "PASS_MAX_DAYS {{ cis_password_max_days }}"
    state: present
  when:
    - remediate | bool

- name: Set password minimum age
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MIN_DAYS'
    line: "PASS_MIN_DAYS {{ cis_password_min_days }}"
    state: present
  when:
    - remediate | bool

- name: Set password minimum length
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MIN_LEN'
    line: "PASS_MIN_LEN {{ cis_password_min_length }}"
    state: present
  when:
    - remediate | bool

- name: Set password warning age
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_WARN_AGE'
    line: "PASS_WARN_AGE {{ cis_password_warn_age }}"
    state: present
  when:
    - remediate | bool

# Network configuration
- name: Disable IP forwarding
  ansible.builtin.command:
    cmd: "sysctl -w net.ipv4.ip_forward=0"
  changed_when: true
  when:
    - remediate | bool

- name: Disable ICMP redirects
  ansible.builtin.command:
    cmd: "sysctl -w {{ item }}=0"
  changed_when: true
  loop:
    - net.ipv4.conf.all.accept_redirects
    - net.ipv4.conf.default.accept_redirects
    - net.ipv4.conf.all.send_redirects
    - net.ipv4.conf.default.send_redirects
  when:
    - remediate | bool

- name: Disable source routing
  ansible.builtin.command:
    cmd: "sysctl -w {{ item }}=0"
  changed_when: true
  loop:
    - net.ipv4.conf.all.accept_source_route
    - net.ipv4.conf.default.accept_source_route
  when:
    - remediate | bool

- name: Enable TCP SYN cookies
  ansible.builtin.command:
    cmd: "sysctl -w net.ipv4.tcp_syncookies=1"
  changed_when: true
  when:
    - remediate | bool

# Logging
- name: Ensure rsyslog is installed
  ansible.builtin.package:
    name: rsyslog
    state: present
  when:
    - remediate | bool

- name: Ensure rsyslog is enabled and running
  ansible.builtin.systemd:
    name: rsyslog
    state: started
    enabled: true
  when:
    - remediate | bool

- name: Configure log file permissions
  ansible.builtin.file:
    path: /var/log
    mode: "0750"
    owner: root
    group: root
  when:
    - remediate | bool

# Process hardening
- name: Restrict core dumps
  ansible.builtin.lineinfile:
    path: /etc/security/limits.conf
    regexp: '^\*\s+hard\s+core'
    line: "* hard core 0"
    state: present
  when:
    - remediate | bool

- name: Set core dump sysctl
  ansible.builtin.command:
    cmd: "sysctl -w fs.suid_dumpable=0"
  changed_when: true
  when:
    - remediate | bool

- name: Enable ASLR
  ansible.builtin.command:
    cmd: "sysctl -w kernel.randomize_va_space=2"
  changed_when: true
  when:
    - remediate | bool

# File integrity (CIS Level 2)
- name: Install AIDE for file integrity monitoring
  ansible.builtin.package:
    name: aide
    state: present
  when:
    - remediate | bool
    - cis_level | int >= 2

- name: Initialize AIDE database
  ansible.builtin.command:
    cmd: aide --init
    creates: /var/lib/aide/aide.db.new.gz
  when:
    - remediate | bool
    - cis_level | int >= 2

- name: Configure AIDE cron job
  ansible.builtin.cron:
    name: "AIDE file integrity check"
    job: "/usr/sbin/aide --check"
    special_time: daily
    user: root
  when:
    - remediate | bool
    - cis_level | int >= 2
