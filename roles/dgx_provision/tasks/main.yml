---
- name: Validate BCM connectivity
  stevefulme1.nvidia_ai_factory.bcm_node_info:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    node_id: "{{ dgx_node_id }}"
    validate_certs: "{{ dgx_provision_validate_certs }}"
  register: node_info

- name: Check current firmware versions
  stevefulme1.nvidia_ai_factory.dgx_firmware_info:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    node_id: "{{ dgx_node_id }}"
    validate_certs: "{{ dgx_provision_validate_certs }}"
  register: firmware_info
  when: dgx_provision_firmware_check

- name: Apply firmware updates if needed
  stevefulme1.nvidia_ai_factory.dgx_firmware:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    node_id: "{{ dgx_node_id }}"
    firmware_url: "{{ dgx_provision_firmware_url }}"
    validate_certs: "{{ dgx_provision_validate_certs }}"
  when:
    - dgx_provision_firmware_check
    - dgx_provision_firmware_url is defined

- name: Configure BIOS settings
  stevefulme1.nvidia_ai_factory.dgx_bios:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    node_id: "{{ dgx_node_id }}"
    settings: "{{ dgx_provision_bios_settings }}"
    reset_after: true
    validate_certs: "{{ dgx_provision_validate_certs }}"

- name: Register node in BCM cluster
  stevefulme1.nvidia_ai_factory.bcm_node:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    hostname: "{{ dgx_hostname }}"
    cluster_id: "{{ bcm_cluster_id }}"
    node_type: "{{ dgx_node_type | default('dgx') }}"
    gpu_type: "{{ dgx_gpu_type }}"
    gpu_count: "{{ dgx_gpu_count }}"
    bmc_address: "{{ dgx_bmc_address }}"
    validate_certs: "{{ dgx_provision_validate_certs }}"
    state: present
    wait: true
    wait_timeout: "{{ dgx_provision_wait_timeout }}"

- name: Verify node health
  stevefulme1.nvidia_ai_factory.dgx_health:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    node_id: "{{ dgx_node_id }}"
    validate_certs: "{{ dgx_provision_validate_certs }}"
  register: health_check
