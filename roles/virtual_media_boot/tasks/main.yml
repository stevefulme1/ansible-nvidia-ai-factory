---
- name: Get current DGX power state
  stevefulme1.nvidia_ai_factory.dgx_health:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    node_id: "{{ dgx_node_id }}"
    validate_certs: "{{ virtual_media_boot_validate_certs }}"
  register: current_state

- name: Configure BIOS for virtual media boot
  stevefulme1.nvidia_ai_factory.dgx_bios:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    node_id: "{{ dgx_node_id }}"
    settings:
      BootMode: "UEFI"
      VirtualMediaBoot: "Enabled"
      BootOrder: "VirtualCD,HDD,PXE"
    reset_after: false
    validate_certs: "{{ virtual_media_boot_validate_certs }}"

- name: Power off DGX for ISO mount
  stevefulme1.nvidia_ai_factory.dgx_power:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    node_id: "{{ dgx_node_id }}"
    power_action: "off"
    validate_certs: "{{ virtual_media_boot_validate_certs }}"
  when: current_state.health.power_state | default('On') == 'On'

- name: Wait for power off
  ansible.builtin.pause:
    seconds: 15
  when: current_state.health.power_state | default('On') == 'On'

- name: Power on DGX to boot from virtual media
  stevefulme1.nvidia_ai_factory.dgx_power:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    node_id: "{{ dgx_node_id }}"
    power_action: "on"
    validate_certs: "{{ virtual_media_boot_validate_certs }}"

- name: Wait for provisioning to complete
  stevefulme1.nvidia_ai_factory.dgx_health:
    bcm_url: "{{ bcm_url }}"
    bcm_token: "{{ bcm_token }}"
    node_id: "{{ dgx_node_id }}"
    validate_certs: "{{ virtual_media_boot_validate_certs }}"
  register: provision_status
  until: provision_status.health.status | default('') == 'OK'
  retries: "{{ (virtual_media_boot_wait_timeout / 30) | int }}"
  delay: 30
